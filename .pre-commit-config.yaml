minimum_pre_commit_version: "3.7.0"

repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: check-merge-conflict
      - id: end-of-file-fixer
      - id: trailing-whitespace
      - id: check-yaml
      - id: check-toml
      - id: check-added-large-files
        args: ["--maxkb=1024"]  # allow the bundled DejaVu font (~700KB)

  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.11.0
    hooks:
      - id: ruff
        args: [--fix]
      - id: ruff-format

  - repo: local
    hooks:
      # Run pyright in the project's uv venv so third-party imports resolve
      # (the isolated pyright-python hook env lacks our dependencies).
      - id: pyright
        name: pyright
        entry: uv run pyright
        language: system
        types: [python]
        pass_filenames: false

  - repo: https://github.com/PyCQA/bandit
    rev: 1.7.9
    hooks:
      - id: bandit
        args: ["-c", "pyproject.toml"]
        files: ^src/

  - repo: https://github.com/commitizen-tools/commitizen
    rev: v3.27.0
    hooks:
      - id: commitizen
        stages: [commit-msg]

  - repo: local
    hooks:
      - id: playbook-check
        name: validate PLAYBOOK markers
        entry: python scripts/extract_playbook.py --check
        language: system
        pass_filenames: false
      - id: sentry-instrumentation
        name: Sentry component tagging guard
        entry: python tools/check_instrumentation.py
        language: system
        files: ^src/.*/(handlers|adapters|agents|engines)/.*\.py$
