name: Security

on:
  schedule:
    - cron: "0 6 * * 1"
  workflow_dispatch:
  pull_request:
    paths:
      - "pyproject.toml"
      - "uv.lock"

permissions:
  contents: read

jobs:
  audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
      - run: uv sync --all-extras
      # Single source of truth: `make security` runs bandit + pip-audit with the
      # documented aiohttp CVE waiver (aiogram caps aiohttp <3.14).
      - name: Security (bandit + pip-audit)
        run: make security
