schema_version: 1
style_id: disney
display_name: "Disney (рисованный мультфильм)"
enabled: true
distance: medium

pipeline:
  - step: 1
    prompt: "Сделай из фото фотореалистичный цветной рисунок."
    refs: [photo]
    gate: vision_judge
  - step: 2
    prompt: "Добавь мягкости цветов и черты характерные для старых рисованных мультфильмов студии Disney"
    refs: [prev]
    gate: vision_judge
  - step: 3
    skip_if_yes: "Ответь да или нет, одним словом: человек на изображении смотрит прямо в камеру?"
    prompt: >-
      Сделай так чтобы герой смотрел в камеру, если голова повернута в другую
      сторону постарайся развернуть ее в камеру на сколько сможешь не теряя
      реалистичности
    refs: [prev]
    gate: none

sticker_style_suffix: "Подписи только на русском языке. {age_clause}"
