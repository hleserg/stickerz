schema_version: 1
style_id: soft_anime
display_name: "Ghibli (мягкое аниме)"
enabled: true
distance: medium

# Same ladder as watercolor; only step 2 differs (soft anime / Ghibli look).
pipeline:
  - step: 1
    prompt: "Сделай из фото фотореалистичный цветной рисунок. {clean_bg}"
    refs: [photo]
    gate: vision_judge
  - step: 2
    prompt: "Добавь мягкости цветов и черты характерные для студии ghibli"
    refs: [prev]
    gate: vision_judge
  - step: 3
    skip_if_yes: "Ответь да или нет, одним словом: человек на изображении смотрит прямо в камеру?"
    prompt: >-
      Сделай так чтобы герой смотрел в камеру, если голова повернута в другую
      сторону постарайся развернуть ее в камеру на сколько сможешь не теряя
      реалистичности
    refs: [prev]
    gate: none

sticker_style_suffix: "Подписи только на русском языке. {age_clause}"
