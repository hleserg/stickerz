schema_version: 1
style_id: watercolor
display_name: "Акварель"
enabled: true
distance: far # watercolor is far from a photo → 3 steps (§4.4)

# Sliding-anchor ladder (§4.1, §4.4):
#   1) photo  → realistic portrait (identity locked from the photo);
#   2) [prev, photo] → line-art + watercolor fill, identity re-anchored to photo;
#   3) [prev] → keep the drawing as-is, only turn the face toward the camera.
pipeline:
  - step: 1
    # Photo → faithful realistic portrait. Keep the face 1:1 from the photo.
    prompt: >-
      Repaint this photograph as a clean, photorealistic digital portrait of the
      SAME person. Copy the facial geometry exactly: face shape, jawline,
      cheekbones, distance between the eyes, nose and mouth shape, hairline and
      hair color. CRITICAL: preserve the EXACT eye color from the photo, whatever
      it is — never change it. Keep the same clothing, skin tone and build.
      Neutral soft lighting, plain light background. {age_clause}
    refs: [photo]
    gate: vision_judge
  - step: 2
    # Realism → line art + watercolor fill. Identity strictly from the photo.
    prompt: >-
      You are given two references: the FIRST image is the realistic portrait
      (use it for the pose), the SECOND image is the ORIGINAL PHOTOGRAPH (the
      ground truth for identity). Redraw it NOT in a realistic style, but as a
      line-art drawing: a thin, clean, crisp ink contour of the face and figure,
      with a textured watercolor fill for color. Take the face shape,
      proportions, hairline, skin tone and the EXACT eye color strictly from the
      original photograph; the person must remain unmistakably the same. Do not
      change the eye color. {age_clause}
    refs: [prev, photo]
    gate: vision_judge
  - step: 3
    # Photo detached. No restyle — only orient the gaze into the camera.
    prompt: >-
      You are given ONE reference: the previous drawing of the character. KEEP
      the exact same appearance, character, drawing style, colors and eye color —
      do NOT restyle, do NOT simplify, do NOT add any extra stylization. The ONLY
      change: turn the head and especially the EYES and GAZE to look straight into
      the camera (direct eye contact), as front-facing as possible, without losing
      likeness, style or quality. Keep everything else identical; if the eyes
      already look at the camera, return it essentially unchanged. {age_clause}
    refs: [prev]
    gate: none

# Appended to the sticker-sheet prompt. The final canonical is attached as the
# reference, so it already carries the art style — here we only lock identity.
sticker_style_suffix: >-
  Every sticker must be the SAME character as in the reference image: keep the
  exact face shape, hair color, skin tone and EYE COLOR, and the same look and
  drawing as the reference character; never change the eye color. {age_clause}
